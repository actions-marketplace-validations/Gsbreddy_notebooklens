name: "NotebookLens"
author: "NotebookLens Contributors"
description: "AI-powered notebook PR review, detects .ipynb changes and posts auto-updating PR comments with optional AI summary."

branding:
  icon: "eye"
  color: "yellow"

inputs:
  ai-provider:
    description: "AI provider to use for review enrichment. Options: none | claude."
    required: false
    default: "none"
  ai-api-key:
    description: "API key used only when ai-provider=claude."
    required: false
  redact-secrets:
    description: "Redact secret-like values before any external AI call."
    required: false
    default: "true"
  redact-emails:
    description: "Redact email addresses before any external AI call."
    required: false
    default: "true"

outputs:
  effective-provider:
    description: "Provider used for this run: none or claude."
  changed-notebooks:
    description: "Count of notebooks with detected changes in this pull request."
  total-cells-changed:
    description: "Total changed notebook cells across the reviewed pull request."
  fallback-reason:
    description: "Reason why NotebookLens fell back to none mode, or empty string when no fallback occurred."

runs:
  using: "docker"
  image: "Dockerfile"
