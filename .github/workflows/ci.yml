name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest

      - name: Build Docker action image
        run: docker build -t notebooklens-ci .

  managed-stack:
    name: managed-stack
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build managed API image
        run: docker build -f apps/api/Dockerfile -t notebooklens-api-ci .

      - name: Build managed web image
        run: docker build -f apps/web/Dockerfile -t notebooklens-web-ci .

      - name: Validate Compose config
        run: |
          docker compose version
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env.example config > /tmp/notebooklens-compose.yml
