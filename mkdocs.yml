site_name: NotebookLens
site_description: Notebook-aware pull request review for Jupyter notebooks on GitHub
repo_url: https://github.com/Gsbreddy/notebooklens
site_url: https://gsbreddy.github.io/notebooklens/
edit_uri: edit/main/docs/
docs_dir: docs
strict: true
repo_name: Gsbreddy/notebooklens

nav:
  - Home: index.md
  - Quick Start:
      - OSS Action: quickstart-action.md
      - Hosted Workspace Beta: quickstart-workspace.md
  - Trust:
      - Privacy and Data Flow: privacy.md
      - Troubleshooting: troubleshooting.md
      - Examples: examples.md
  - Operators:
      - Self-Hosting: self-hosting.md
      - LiteLLM Admin Settings: admin-ai-settings.md
      - GitHub PR Sync: github-pr-sync.md

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
